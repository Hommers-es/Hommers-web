<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje enviado — Hommers 360° Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white: #ffffff; --dark: #161412; --gold: #b09050; --gold-light: #c8aa70;
  --text-main: #161412; --text-muted: #5a5248;
  --serif: 'Cormorant Garamond', Georgia, serif; --sans: 'Inter', system-ui, sans-serif;
}
body { font-family: var(--sans); background: var(--white); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; -webkit-font-smoothing: antialiased; }
.box { text-align: center; max-width: 480px; }
.gold-rule { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 32px; }
h1 { font-family: var(--serif); font-size: 38px; font-weight: 300; margin-bottom: 18px; }
h1 em { font-style: italic; color: var(--gold); }
p { font-size: 14px; color: var(--text-muted); line-height: 1.8; margin-bottom: 36px; font-weight: 300; }
a { display: inline-block; font-size: 11px; letter-spacing: 0.12em; padding: 13px 32px; background: var(--dark); color: var(--white); text-decoration: none; }
</style>
</head>
<body>
<div class="box">
  <div class="gold-rule"></div>
  <h1>Mensaje <em>enviado</em></h1>
  <p>Gracias por contarnos tu proyecto. Nos pondremos en contacto contigo en menos de 24 horas.</p>
  <a href="360-projects.html">Volver a Hommers 360° Projects</a>
</div>
</body>
</html>
